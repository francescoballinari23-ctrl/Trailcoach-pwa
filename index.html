<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrailCoach App</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --primary-color: #2c3e50;
            --accent-color: #27ae60;
            --text-color: #333333;
            --muted-color: #7f8c8d;
            --border-color: #e2e8f0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            line-height: 1.5;
        }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { text-align: center; color: var(--primary-color); font-size: 24px; margin-bottom: 20px; }
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
            box-sizing: border-box;
        }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: var(--primary-color); font-size: 14px; }
        input, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
        }
        .btn-group { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .btn-group button, .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 15px;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .btn-primary { background-color: var(--primary-color); color: white; }
        .btn-accent { background-color: var(--accent-color); color: white; }
        .btn-secondary { background-color: #7f8c8d; color: white; }
        .btn-danger { background-color: #c0392b; color: white; }
        .week-selector { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .chk-btn {
            padding: 10px 5px;
            border: 1px solid var(--border-color);
            background: #fff;
            border-radius: 8px;
            text-align: center;
            font-size: 13px;
            cursor: pointer;
            user-select: none;
            font-weight: 500;
        }
        .chk-btn.active {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }
        .chk-btn[data-type="palestra"].active {
            background-color: #8e44ad;
            border-color: #8e44ad;
        }
        .accordion {
            background-color: #eef2f5;
            color: var(--primary-color);
            padding: 15px;
            width: 100%;
            text-align: left;
            border: none;
            outline: none;
            font-weight: 600;
            font-size: 15px;
            border-radius: 8px;
            margin-top: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .accordion.active { background-color: #dfe6e9; }
        .panel { padding: 10px 5px; display: none; background-color: white; overflow: hidden; }
        .day {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
        }
        .day:last-child { border-bottom: none; }
        .day-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .day-status { margin-right: 8px; }
        .day-details-panel { display: none; padding: 10px; background: #f9f9f9; border-radius: 6px; margin-top: 8px; font-size: 14px; }
        .muted { color: var(--muted-color); font-size: 13px; margin-top: 4px; }
        .gpx-upload-btn {
            background: var(--accent-color);
            color: white;
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 6px;
            margin-top: 8px;
            display: inline-block;
            width: auto;
            flex: none;
        }
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content { background: white; padding: 20px; border-radius: 12px; width: 90%; max-width: 400px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        
        /* Protezione rendering per html2canvas su Safari mobile */
        #planView, #piano-generato {
            min-height: 50px;
            overflow: visible;
            clear: both;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🏔️ TrailCoach v1.7.4</h1>

    <div class="btn-group">
        <button id="toggleSettings" class="btn-primary">⚙️ Impostazioni Piano</button>
        <button id="updatePlanBtn" class="btn-accent" style="background-color: #d35400;">🔄 Aggiorna Settimane Future</button>
        <button id="btnEsporta" class="btn btn-secondary">📤 Esporta JSON</button>
        <button id="btnImporta" class="btn btn-secondary">📥 Importa JSON</button>
        <button id="resetData" class="btn-danger">🗑️ Resetta Tutto</button>
    </div>

    <div class="card" id="settingsCard" style="display: none;">
        <label for="livello">Il tuo Record attuale sui 10km su strada</label>
        <select id="livello">
            <option value="5.8" selected>Intermedio (10k in ~58 min | Passo ~5:48/km)</option>
            <option value="6.5">Principiante (10k in ~1h 05m | Passo ~6:30/km)</option>
            <option value="5.0">Avanzato (10k in ~50 min | Passo ~5:00/km)</option>
            <option value="4.2">Elite (10k in ~42 min | Passo ~4:12/km)</option>
        </select>

        <label for="obbKm">Obiettivo Chilometri Settimanali Massimi (km)</label>
        <input type="number" id="obbKm" value="50" min="10">

        <label for="obbAsc">Obiettivo Dislivello Settimanale Massimo (m D+)</label>
        <input type="number" id="obbAsc" value="2000" min="100">

        <label for="settimane">Durata del Piano (Settimane)</label>
        <input type="number" id="settimane" value="12" min="4" max="24">

        <label for="dataGara">Data della Gara (Domenica finale)</label>
        <input type="date" id="dataGara">

        <label for="tempoObiettivo">Tempo Obiettivo Gara (Ore totali stimate)</label>
        <input type="number" id="tempoObiettivo" value="6" step="0.5">

        <label>Giorni Disponibili per la Corsa 🏃</label>
        <div class="week-selector">
            <div class="chk-btn" data-day="Lunedì" data-type="corsa">Lun</div>
            <div class="chk-btn" data-day="Martedì" data-type="corsa">Mar</div>
            <div class="chk-btn" data-day="Mercoledì" data-type="corsa">Mer</div>
            <div class="chk-btn" data-day="Giovedì" data-type="corsa">Gio</div>
            <div class="chk-btn" data-day="Venerdì" data-type="corsa">Ven</div>
            <div class="chk-btn" data-day="Sabato" data-type="corsa">Sab</div>
            <div class="chk-btn" data-day="Domenica" data-type="corsa">Dom</div>
        </div>

        <label>Giorni Disponibili per la Palestra 🏋️</label>
        <div class="week-selector">
            <div class="chk-btn" data-day="Lunedì" data-type="palestra">Lun</div>
            <div class="chk-btn" data-day="Martedì" data-type="palestra">Mar</div>
            <div class="chk-btn" data-day="Mercoledì" data-type="palestra">Mer</div>
            <div class="chk-btn" data-day="Giovedì" data-type="palestra">Gio</div>
            <div class="chk-btn" data-day="Venerdì" data-type="palestra">Ven</div>
            <div class="chk-btn" data-day="Sabato" data-type="palestra">Sab</div>
            <div class="chk-btn" data-day="Domenica" data-type="palestra">Dom</div>
        </div>

        <div class="btn-group">
            <button id="genLocal" class="btn-primary">⚙️ Genera Piano Locale</button>
            <button id="genAI" class="btn-accent">🧠 Genera con Intelligenza Artificiale</button>
        </div>
    </div>

    <div class="card" id="PlandCard" style="display:none;">
        <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:15px;">
            <h3 style="margin:0; color:var(--primary-color);">📋 Il tuo Piano di Allenamento</h3>
            <button onclick="window.esportaInPDF('planView')" class="btn-accent" style="padding: 6px 12px; font-size:12px; flex:none;">📄 Esporta PDF</button>
        </div>
        <div id="planView"></div>
    </div>

    <div class="card" id="aiPlanCard" style="display:none;">
        <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:15px;">
            <h3 style="margin:0; color:#8e44ad;">🧠 Piano Ottimizzato dall'AI</h3>
            <button onclick="window.esportaInPDF('piano-generato')" class="btn-accent" style="background:#8e44ad; padding: 6px 12px; font-size:12px; flex:none;">📄 Esporta PDF</button>
        </div>
        <div id="piano-generato"></div>
    </div>
</div>

<input type="file" id="hiddenFileInput" accept=".gpx" style="display: none;" />

<div class="modal" id="editModal">
    <div class="modal-content">
        <h3 style="margin-top:0; color:var(--primary-color);">✏️ Modifica Allenamento</h3>
        <div id="modalForm"></div>
        <div class="btn-group" style="margin-top:15px;">
            <button id="saveEditBtn" class="btn-accent">Salva</button>
            <button onclick="window.closeEditDialog()" class="btn-primary" style="background:#7f8c8d;">Annulla</button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
    window.closeEditDialog = function() {
        const modal = document.getElementById("editModal");
        if (modal) modal.style.display = 'none';
    };

    window.esportaInPDF = async function(elementId) {
        const elemento = document.getElementById(elementId);
        if (!elemento || elemento.children.length === 0) {
            alert("⚠️ Generazione annullata: Il contenitore del piano è vuoto.");
            return;
        }
        alert("⏳ Generazione PDF in corso...");
        try {
            const { jsPDF } = window.jspdf;
            const canvas = await html2canvas(elemento, { 
                scale: 2, 
                useCORS: true,
                logging: false,
                allowTaint: true
            });
            const imgData = canvas.toDataURL('image/png');
            const pdf = new jsPDF('p', 'mm', 'a4');
            const imgWidth = 210;
            const pageHeight = 295;
            const imgHeight = (canvas.height * imgWidth) / canvas.width;
            let heightLeft = imgHeight;
            let position = 0;

            pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
            heightLeft -= pageHeight;

            while (heightLeft >= 0) {
                position = heightLeft - imgHeight;
                pdf.addPage();
                pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
                heightLeft -= pageHeight;
            }
            pdf.save('Piano_Allenamento_Trail.pdf');
        } catch (err) {
            alert("Errore esportazione PDF: " + err.message);
        }
    };
</script>

<script type="module" src="./app.js"></script>
</body>
</html>
